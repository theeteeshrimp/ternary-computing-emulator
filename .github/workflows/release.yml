name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            binary: ternary-emulator
          - os: macos-latest
            target: macos
            binary: ternary-emulator
          - os: windows-latest
            target: windows
            binary: ternary-emulator.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build binary
        run: |
          cd src/ternary_emulator
          pyinstaller --onefile --name ternary-emulator cli.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ternary-emulator-${{ matrix.target }}
          path: src/ternary_emulator/dist/${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
